<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Vibe Coding</title>
    <style>
      :root {
        --bg-gradient-start: #f8fafc;
        --bg-gradient-end: #e2e8f0;
        --text-color: #0f172a;
        --card-bg: #ffffff;
        --button-bg: #2563eb;
        --button-hover-bg: #1d4ed8;
        --button-secondary-bg: #475569;
        --button-secondary-hover-bg: #334155;
        --button-danger-bg: #dc2626;
        --button-danger-hover-bg: #b91c1c;
        --shadow-color: rgba(15, 23, 42, 0.12);
      }

      body.theme-dark {
        --bg-gradient-start: #0f172a;
        --bg-gradient-end: #1e293b;
        --text-color: #e2e8f0;
        --card-bg: #1f2937;
        --button-bg: #3b82f6;
        --button-hover-bg: #2563eb;
        --button-secondary-bg: #64748b;
        --button-secondary-hover-bg: #475569;
        --button-danger-bg: #ef4444;
        --button-danger-hover-bg: #dc2626;
        --shadow-color: rgba(2, 6, 23, 0.45);
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
        color: var(--text-color);
        transition: background 0.2s ease, color 0.2s ease;
      }

      .card {
        width: min(92vw, 520px);
        background: var(--card-bg);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 28px var(--shadow-color);
        text-align: center;
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.8rem;
      }

      .stats {
        margin: 0 auto 18px;
        text-align: left;
        width: fit-content;
        line-height: 1.7;
      }

      .stats strong {
        font-weight: 700;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        cursor: pointer;
        background: var(--button-bg);
        color: #fff;
        font-size: 1rem;
      }

      button:hover {
        background: var(--button-hover-bg);
      }

      .secondary-btn {
        background: var(--button-secondary-bg);
      }

      .secondary-btn:hover {
        background: var(--button-secondary-hover-bg);
      }

      .danger-btn {
        background: var(--button-danger-bg);
      }

      .danger-btn:hover {
        background: var(--button-danger-hover-bg);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello Vibe Coding</h1>
      <div class="stats">
        <div>总点击次数：<strong id="count-value">0</strong></div>
        <div>今日点击次数：<strong id="today-count-value">0</strong></div>
        <div>历史最高点击次数（单日）：<strong id="max-daily-count-value">0</strong></div>
      </div>
      <div class="actions">
        <button id="increment-btn" type="button">点我 +1</button>
        <button id="reset-btn" class="secondary-btn" type="button">重置总点击数</button>
        <button id="theme-toggle-btn" class="secondary-btn" type="button">🌙 暗黑模式：关</button>
        <button id="clear-all-btn" class="danger-btn" type="button">清空所有数据</button>
      </div>
    </main>

    <script>
      const COUNT_STORAGE_KEY = "vibe-coding-lab-click-count";
      const THEME_STORAGE_KEY = "vibe-coding-lab-theme";
      const DAILY_STATS_STORAGE_KEY = "vibe-coding-lab-daily-stats";

      const countElement = document.getElementById("count-value");
      const todayCountElement = document.getElementById("today-count-value");
      const maxDailyCountElement = document.getElementById("max-daily-count-value");
      const incrementButton = document.getElementById("increment-btn");
      const resetButton = document.getElementById("reset-btn");
      const themeToggleButton = document.getElementById("theme-toggle-btn");
      const clearAllButton = document.getElementById("clear-all-btn");

      function getTodayDateString() {
        // 使用本地时区的 YYYY-MM-DD，满足“按本地日期”统计。
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function parseCount(value) {
        const parsed = Number.parseInt(value ?? "0", 10);
        return Number.isNaN(parsed) ? 0 : parsed;
      }

      // 总点击数：单独存储，重置按钮只影响这一项。
      let count = parseCount(localStorage.getItem(COUNT_STORAGE_KEY));

      // 读取并应用上次保存的主题。默认 light。
      let theme = localStorage.getItem(THEME_STORAGE_KEY) === "dark" ? "dark" : "light";

      // 每日统计数据结构：
      // {
      //   currentDate: "YYYY-MM-DD",
      //   todayCount: number,
      //   historyMaxDailyCount: number,
      //   historyByDate: { "YYYY-MM-DD": number }
      // }
      function getDefaultDailyStats() {
        return {
          currentDate: getTodayDateString(),
          todayCount: 0,
          historyMaxDailyCount: 0,
          historyByDate: {},
        };
      }

      function loadDailyStats() {
        const raw = localStorage.getItem(DAILY_STATS_STORAGE_KEY);
        if (!raw) {
          return getDefaultDailyStats();
        }

        try {
          const parsed = JSON.parse(raw);
          return {
            currentDate:
              typeof parsed.currentDate === "string" ? parsed.currentDate : getTodayDateString(),
            todayCount: parseCount(String(parsed.todayCount ?? "0")),
            historyMaxDailyCount: parseCount(String(parsed.historyMaxDailyCount ?? "0")),
            historyByDate:
              parsed.historyByDate && typeof parsed.historyByDate === "object"
                ? parsed.historyByDate
                : {},
          };
        } catch {
          return getDefaultDailyStats();
        }
      }

      let dailyStats = loadDailyStats();

      function normalizeDailyStatsForToday() {
        const today = getTodayDateString();
        if (dailyStats.currentDate !== today) {
          // 跨天：今日计数自动归零，但历史记录保留。
          dailyStats.currentDate = today;
          dailyStats.todayCount = 0;
          if (!dailyStats.historyByDate[today]) {
            dailyStats.historyByDate[today] = 0;
          }
          persistDailyStats();
        }
      }

      function renderCounts() {
        countElement.textContent = String(count);
        todayCountElement.textContent = String(dailyStats.todayCount);
        maxDailyCountElement.textContent = String(dailyStats.historyMaxDailyCount);
      }

      function persistCount() {
        localStorage.setItem(COUNT_STORAGE_KEY, String(count));
      }

      function persistDailyStats() {
        localStorage.setItem(DAILY_STATS_STORAGE_KEY, JSON.stringify(dailyStats));
      }

      function incrementCounters() {
        count += 1;
        dailyStats.todayCount += 1;
        dailyStats.historyByDate[dailyStats.currentDate] = dailyStats.todayCount;

        if (dailyStats.todayCount > dailyStats.historyMaxDailyCount) {
          dailyStats.historyMaxDailyCount = dailyStats.todayCount;
        }

        renderCounts();
        persistCount();
        persistDailyStats();
      }

      function renderTheme() {
        document.body.classList.toggle("theme-dark", theme === "dark");
        themeToggleButton.textContent =
          theme === "dark" ? "☀️ 暗黑模式：开" : "🌙 暗黑模式：关";
      }

      function persistTheme() {
        localStorage.setItem(THEME_STORAGE_KEY, theme);
      }

      incrementButton.addEventListener("click", () => {
        incrementCounters();
      });

      resetButton.addEventListener("click", () => {
        // 只重置总点击数，不影响“今日/历史”统计。
        count = 0;
        renderCounts();
        persistCount();
      });

      themeToggleButton.addEventListener("click", () => {
        theme = theme === "dark" ? "light" : "dark";
        renderTheme();
        persistTheme();
      });

      clearAllButton.addEventListener("click", () => {
        const shouldClear = confirm("确认清空所有本地数据吗？此操作不可撤销。");
        if (!shouldClear) {
          return;
        }

        localStorage.removeItem(COUNT_STORAGE_KEY);
        localStorage.removeItem(THEME_STORAGE_KEY);
        localStorage.removeItem(DAILY_STATS_STORAGE_KEY);

        count = 0;
        theme = "light";
        dailyStats = getDefaultDailyStats();

        renderCounts();
        renderTheme();
      });

      normalizeDailyStatsForToday();
      renderCounts();
      renderTheme();
    </script>
  </body>
</html>
