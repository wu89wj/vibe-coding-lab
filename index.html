<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Vibe Coding</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        color: #0f172a;
      }

      .card {
        width: min(90vw, 460px);
        background: #ffffff;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.8rem;
      }

      .count {
        margin: 0 0 18px;
        font-size: 1.1rem;
      }

      #count-value {
        font-weight: 700;
        font-size: 1.5rem;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
        font-size: 1rem;
      }

      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello Vibe Coding</h1>
      <p class="count">当前点击次数：<span id="count-value">0</span></p>
      <button id="increment-btn" type="button">点我 +1</button>
    </main>

    <script>
      const STORAGE_KEY = "vibe-coding-lab-click-count";
      const countElement = document.getElementById("count-value");
      const incrementButton = document.getElementById("increment-btn");

      const rawSavedValue = localStorage.getItem(STORAGE_KEY);
      const savedCount = Number.parseInt(rawSavedValue ?? "0", 10);
      let count = Number.isNaN(savedCount) ? 0 : savedCount;

      function renderCount() {
        countElement.textContent = String(count);
      }

      function persistCount() {
        localStorage.setItem(STORAGE_KEY, String(count));
      }

      incrementButton.addEventListener("click", () => {
        count += 1;
        renderCount();
        persistCount();
      });

      renderCount();
    </script>
  </body>
</html>
