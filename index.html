<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Vibe Coding</title>
    <style>
      :root {
        --bg-gradient-start: #f8fafc;
        --bg-gradient-end: #e2e8f0;
        --text-color: #0f172a;
        --card-bg: #ffffff;
        --button-bg: #2563eb;
        --button-hover-bg: #1d4ed8;
        --button-secondary-bg: #475569;
        --button-secondary-hover-bg: #334155;
        --shadow-color: rgba(15, 23, 42, 0.12);
      }

      body.theme-dark {
        --bg-gradient-start: #0f172a;
        --bg-gradient-end: #1e293b;
        --text-color: #e2e8f0;
        --card-bg: #1f2937;
        --button-bg: #3b82f6;
        --button-hover-bg: #2563eb;
        --button-secondary-bg: #64748b;
        --button-secondary-hover-bg: #475569;
        --shadow-color: rgba(2, 6, 23, 0.45);
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
        color: var(--text-color);
        transition: background 0.2s ease, color 0.2s ease;
      }

      .card {
        width: min(90vw, 460px);
        background: var(--card-bg);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 28px var(--shadow-color);
        text-align: center;
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.8rem;
      }

      .count {
        margin: 0 0 18px;
        font-size: 1.1rem;
      }

      #count-value {
        font-weight: 700;
        font-size: 1.5rem;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        cursor: pointer;
        background: var(--button-bg);
        color: #fff;
        font-size: 1rem;
      }

      button:hover {
        background: var(--button-hover-bg);
      }

      .secondary-btn {
        background: var(--button-secondary-bg);
      }

      .secondary-btn:hover {
        background: var(--button-secondary-hover-bg);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello Vibe Coding</h1>
      <p class="count">当前点击次数：<span id="count-value">0</span></p>
      <div class="actions">
        <button id="increment-btn" type="button">点我 +1</button>
        <button id="reset-btn" class="secondary-btn" type="button">重置计数</button>
        <button id="theme-toggle-btn" class="secondary-btn" type="button">🌙 暗黑模式：关</button>
      </div>
    </main>

    <script>
      const COUNT_STORAGE_KEY = "vibe-coding-lab-click-count";
      const THEME_STORAGE_KEY = "vibe-coding-lab-theme";

      const countElement = document.getElementById("count-value");
      const incrementButton = document.getElementById("increment-btn");
      const resetButton = document.getElementById("reset-btn");
      const themeToggleButton = document.getElementById("theme-toggle-btn");

      // 启动时先从 localStorage 恢复计数，异常值回退为 0。
      const rawSavedCount = localStorage.getItem(COUNT_STORAGE_KEY);
      const parsedCount = Number.parseInt(rawSavedCount ?? "0", 10);
      let count = Number.isNaN(parsedCount) ? 0 : parsedCount;

      // 读取并应用上次保存的主题。默认使用 light。
      let theme = localStorage.getItem(THEME_STORAGE_KEY) === "dark" ? "dark" : "light";

      function renderCount() {
        countElement.textContent = String(count);
      }

      function persistCount() {
        localStorage.setItem(COUNT_STORAGE_KEY, String(count));
      }

      function renderTheme() {
        document.body.classList.toggle("theme-dark", theme === "dark");
        themeToggleButton.textContent =
          theme === "dark" ? "☀️ 暗黑模式：开" : "🌙 暗黑模式：关";
      }

      function persistTheme() {
        localStorage.setItem(THEME_STORAGE_KEY, theme);
      }

      incrementButton.addEventListener("click", () => {
        count += 1;
        renderCount();
        persistCount();
      });

      resetButton.addEventListener("click", () => {
        count = 0;
        renderCount();
        persistCount();
      });

      themeToggleButton.addEventListener("click", () => {
        theme = theme === "dark" ? "light" : "dark";
        renderTheme();
        persistTheme();
      });

      renderCount();
      renderTheme();
    </script>
  </body>
</html>
